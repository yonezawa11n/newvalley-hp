<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>お知らせ管理 — NewValley</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#faf7f0;font-family:'Noto Sans JP',sans-serif;color:#43332a;min-height:100vh;}
.header{background:#43332a;padding:18px 32px;display:flex;align-items:center;gap:14px;}
.header h1{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:18px;color:#fff;}
.header span{font-size:12px;color:rgba(255,255,255,.55);margin-left:auto;}
.wrap{max-width:860px;margin:0 auto;padding:36px 24px 80px;}

/* ロック画面 */
#lock-screen{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px);}
.lock-card{background:#fff;border-radius:24px;padding:48px 44px;box-shadow:0 8px 32px rgba(67,51,42,.1);width:100%;max-width:380px;text-align:center;}
.lock-card h2{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:22px;margin-bottom:8px;}
.lock-card p{font-size:13px;color:#a99c8f;margin-bottom:28px;}
.lock-input{width:100%;padding:14px 18px;border:2px solid #ece4d4;border-radius:12px;font-size:16px;text-align:center;letter-spacing:.2em;outline:none;transition:border-color .2s;}
.lock-input:focus{border-color:#6f9fc1;}
.lock-btn{margin-top:16px;width:100%;padding:14px;background:#43332a;color:#fff;border:none;border-radius:999px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:16px;cursor:pointer;}
.lock-btn:hover{opacity:.85;}
.lock-err{color:#c86880;font-size:13px;margin-top:10px;display:none;}

/* メイン */
#main-screen{display:none;}
.section-title{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:20px;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.section-title::before{content:'';display:block;width:5px;height:22px;background:#6f9fc1;border-radius:3px;}
.card{background:#fff;border-radius:20px;padding:32px 36px;box-shadow:0 4px 20px rgba(67,51,42,.07);margin-bottom:40px;}

label{display:block;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:13px;color:#6b6358;margin-bottom:8px;}
.field{margin-bottom:22px;}
input[type=text],input[type=date],input[type=url],select,textarea{
  width:100%;padding:13px 16px;border:2px solid #ece4d4;border-radius:12px;
  font-family:'Noto Sans JP',sans-serif;font-size:14px;color:#43332a;
  background:#fff;outline:none;transition:border-color .2s;
}
input:focus,select:focus,textarea:focus{border-color:#6f9fc1;}
textarea{resize:vertical;min-height:180px;line-height:1.8;}
.hint{font-size:12px;color:#a99c8f;margin-top:6px;line-height:1.6;}

.img-preview{margin-top:10px;border-radius:12px;overflow:hidden;max-height:200px;display:none;}
.img-preview img{width:100%;height:200px;object-fit:cover;display:block;}

.submit-btn{width:100%;padding:16px;background:#4a7a3f;color:#fff;border:none;border-radius:999px;
  font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:17px;cursor:pointer;
  box-shadow:0 4px 0 #365c2e;transition:opacity .15s;}
.submit-btn:hover{opacity:.88;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}

.result-msg{text-align:center;padding:14px;border-radius:12px;font-weight:700;font-size:14px;margin-top:16px;display:none;}
.result-msg.ok{background:#e8f5e9;color:#2e7d32;}
.result-msg.err{background:#fce4e4;color:#c62828;}

/* 記事一覧 */
.article-item{display:flex;align-items:flex-start;gap:16px;padding:18px 0;border-bottom:1px solid #f0e8d8;}
.article-item:last-child{border-bottom:none;}
.article-thumb{flex:none;width:72px;height:54px;border-radius:8px;overflow:hidden;background:#f0e8d8;}
.article-thumb img{width:100%;height:100%;object-fit:cover;}
.article-body{flex:1;min-width:0;}
.article-date{font-size:11px;color:#a99c8f;margin-bottom:3px;}
.article-cat{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:#6f9fc1;padding:2px 8px;border-radius:999px;margin-bottom:5px;}
.article-title{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:14px;color:#43332a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.del-btn{flex:none;padding:6px 14px;border:1.5px solid #e0c8b8;border-radius:8px;background:#fff;color:#a99c8f;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
.del-btn:hover{border-color:#c86880;color:#c86880;}

.empty-msg{text-align:center;padding:40px 0;color:#a99c8f;font-size:14px;}
.badge-static{background:#f0e8d8;color:#a99c8f;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;}
</style>
</head>
<body>

<div class="header">
  <h1>📋 お知らせ管理</h1>
  <a href="index.dc.html" style="margin-left:auto;text-decoration:none;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:13px;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:6px;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,.7)'">← サイトに戻る</a>
</div>

<!-- ロック画面 -->
<div id="lock-screen">
  <div class="lock-card">
    <h2>管理者ログイン</h2>
    <p>パスワードを入力してください</p>
    <input class="lock-input" type="password" id="pw-input" placeholder="●●●●●●●●" autocomplete="current-password">
    <button class="lock-btn" onclick="checkPassword()">ログイン</button>
    <div class="lock-err" id="pw-err">パスワードが違います</div>
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen">
  <div class="wrap">

    <!-- 投稿フォーム -->
    <div class="section-title" id="form-title">新しい記事を投稿</div>
    <div id="edit-cancel-bar" style="display:none;margin-bottom:16px;">
      <button onclick="cancelEdit()" style="background:#f0e8d8;border:none;border-radius:999px;padding:8px 20px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:13px;color:#6b6358;cursor:pointer;">✕ 編集をキャンセル</button>
    </div>
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div class="field">
          <label>日付 <span style="color:#c86880;">*</span></label>
          <input type="date" id="f-date">
        </div>
        <div class="field">
          <label>カテゴリ <span style="color:#c86880;">*</span></label>
          <select id="f-category">
            <option>お知らせ</option>
            <option>採用情報</option>
            <option>イベント</option>
            <option>活動報告</option>
            <option>スタッフ</option>
            <option>受賞・表彰</option>
            <option>その他</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>タイトル <span style="color:#c86880;">*</span></label>
        <input type="text" id="f-title" placeholder="記事のタイトルを入力">
      </div>

      <div class="field">
        <label>概要文（一覧に表示される説明）</label>
        <input type="text" id="f-excerpt" placeholder="100〜150字程度の説明文">
      </div>

      <div class="field">
        <label>画像</label>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <label id="file-label" style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;background:#f0e8d8;border:2px dashed #c8b89a;border-radius:12px;padding:12px 20px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:13px;color:#6b6358;transition:border-color .2s;margin-bottom:0;">
            📷 画像を選択
            <input type="file" id="f-image-file" accept="image/*" style="display:none;">
          </label>
          <span id="upload-status" style="font-size:12px;color:#a99c8f;"></span>
        </div>
        <input type="text" id="f-image" placeholder="画像URLが自動入力されます（または外部URL直接入力も可）" style="margin-top:10px;">
        <div class="hint">ファイルを選ぶと自動でVercelにアップロードされます。外部URLを直接入力することもできます。</div>
        <div class="img-preview" id="img-preview"><img id="img-preview-img" src=""></div>
      </div>

      <div class="field">
        <label>本文</label>
        <textarea id="f-body" placeholder="記事の詳細内容を入力。HTMLタグも使えます。&#10;例：&lt;p&gt;本文&lt;/p&gt; &lt;br&gt; &lt;strong&gt;太字&lt;/strong&gt;"></textarea>
        <div class="hint">改行は &lt;br&gt;、段落は &lt;p&gt;〜&lt;/p&gt;、太字は &lt;strong&gt;〜&lt;/strong&gt; で記述できます。</div>
      </div>

      <div class="field">
        <label>関連URL（外部リンク・任意）</label>
        <input type="url" id="f-url" placeholder="https://...">
        <div class="hint">入力すると本文末尾に「詳しくはこちら」ボタンが表示されます。</div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="submitArticle()">投稿する</button>
      <div id="update-btn-wrap" style="display:none;margin-top:12px;">
        <button class="submit-btn" id="update-btn" onclick="submitArticle()" style="background:#6f9fc1;box-shadow:0 4px 0 #5a89ab;">更新する</button>
      </div>
      <div class="result-msg" id="result-msg"></div>
    </div>

    <!-- 記事一覧 -->
    <div class="section-title">投稿済み記事</div>
    <div class="card">
      <div id="articles-list"><div class="empty-msg">読み込み中...</div></div>
    </div>

  </div>
</div>

<script>
var SESSION_KEY = 'nv_admin_pass';
var __editingId = null;
var __allArticles = [];
var savedPass = sessionStorage.getItem(SESSION_KEY);
if (savedPass) { unlockWithPass(savedPass); }

// 今日の日付をデフォルトにセット
document.addEventListener('DOMContentLoaded', function() {
  var today = new Date();
  var y = today.getFullYear();
  var m = String(today.getMonth()+1).padStart(2,'0');
  var d = String(today.getDate()).padStart(2,'0');
  document.getElementById('f-date').value = y + '-' + m + '-' + d;
});

// 画像ファイル選択時にVercel Blobへアップロード
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('f-image-file').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var status = document.getElementById('upload-status');
    status.textContent = 'アップロード中...';
    status.style.color = '#6f9fc1';
    var reader = new FileReader();
    reader.onload = function(ev) {
      fetch('/api/news-admin', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: window.__adminPass, filename: file.name, base64: ev.target.result }),
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.url) {
          document.getElementById('f-image').value = data.url;
          updateImagePreview(data.url);
          status.textContent = '✅ アップロード完了';
          status.style.color = '#2e7d32';
        } else {
          status.textContent = '❌ ' + (data.error || 'アップロード失敗');
          status.style.color = '#c62828';
        }
      })
      .catch(function() {
        status.textContent = '❌ 通信エラー';
        status.style.color = '#c62828';
      });
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('f-image').addEventListener('input', function() {
    updateImagePreview(this.value);
  });
});

function updateImagePreview(src) {
  var preview = document.getElementById('img-preview');
  var img = document.getElementById('img-preview-img');
  if (src) {
    img.src = src;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }
}

function checkPassword() {
  var pw = document.getElementById('pw-input').value;
  unlockWithPass(pw);
}
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('pw-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });
});

function unlockWithPass(pw) {
  // サーバーに確認（GETで記事を取れれば正しいパスワードと判定）
  fetch('/api/news-admin')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error && data.error.includes('KV not configured')) {
        alert('Vercel KV が設定されていません。設定手順に従ってKVストアを作成してください。');
        return;
      }
      // パスワードはPOSTでのみ検証
      sessionStorage.setItem(SESSION_KEY, pw);
      window.__adminPass = pw;
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      loadArticles();
    })
    .catch(function() {
      // オフライン等でもUIを表示
      sessionStorage.setItem(SESSION_KEY, pw);
      window.__adminPass = pw;
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('main-screen').style.display = 'block';
      loadArticles();
    });
}

function loadArticles() {
  fetch('/api/news-admin')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      renderArticleList(data.articles || []);
    })
    .catch(function() {
      document.getElementById('articles-list').innerHTML = '<div class="empty-msg">記事の読み込みに失敗しました</div>';
    });
}

function renderArticleList(articles) {
  __allArticles = articles;
  var el = document.getElementById('articles-list');
  if (!articles.length) {
    el.innerHTML = '<div class="empty-msg">投稿済み記事はありません</div>';
    return;
  }
  el.innerHTML = '';
  articles.forEach(function(a) {
    var d = new Date(a.date);
    var dateStr = d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
    var thumbHtml = a.image
      ? '<img src="' + a.image + '" onerror="this.style.display=\'none\'">'
      : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:22px;">📄</div>';
    var row = document.createElement('div');
    row.className = 'article-item';
    row.innerHTML = '<div class="article-thumb">' + thumbHtml + '</div>'
      + '<div class="article-body">'
      + '<div class="article-date">' + dateStr + '</div>'
      + '<span class="article-cat">' + (a.category||'お知らせ') + '</span>'
      + '<div class="article-title">' + a.title + '</div>'
      + '</div>'
      + '<div style="display:flex;gap:8px;flex:none;">'
      + '<button class="del-btn" onclick="editArticle(\'' + a.id + '\')" style="border-color:#6f9fc1;color:#6f9fc1;">編集</button>'
      + '<button class="del-btn" onclick="deleteArticle(\'' + a.id + '\')">削除</button>'
      + '</div>';
    el.appendChild(row);
  });
}

function editArticle(id) {
  var a = __allArticles.find(function(x){ return x.id === id; });
  if (!a) return;
  __editingId = id;

  document.getElementById('f-date').value = a.date || '';
  document.getElementById('f-category').value = a.category || 'お知らせ';
  document.getElementById('f-title').value = a.title || '';
  document.getElementById('f-excerpt').value = a.excerpt || '';
  document.getElementById('f-image').value = a.image || '';
  document.getElementById('f-url').value = '';

  // bodyからテキスト部分を復元
  var rawBody = (a.body || '').replace(/<p[^>]*>/gi,'').replace(/<\/p>/gi,'').replace(/<br\s*\/?>/gi,'\n').replace(/<div[^>]*>[\s\S]*?<\/div>/gi,'').trim();
  document.getElementById('f-body').value = rawBody;

  if (a.image) updateImagePreview(a.image);

  document.getElementById('form-title').textContent = '記事を編集中';
  document.getElementById('edit-cancel-bar').style.display = 'block';
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('update-btn-wrap').style.display = 'block';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
  __editingId = null;
  clearForm();
  document.getElementById('form-title').textContent = '新しい記事を投稿';
  document.getElementById('edit-cancel-bar').style.display = 'none';
  document.getElementById('submit-btn').style.display = 'block';
  document.getElementById('update-btn-wrap').style.display = 'none';
}

function submitArticle() {
  var btn = document.getElementById('submit-btn');
  var msg = document.getElementById('result-msg');
  var title = document.getElementById('f-title').value.trim();
  var date  = document.getElementById('f-date').value;
  var cat   = document.getElementById('f-category').value;

  if (!title || !date) {
    showMsg('タイトルと日付は必須です', 'err');
    return;
  }

  var body = document.getElementById('f-body').value.trim();
  var url  = document.getElementById('f-url').value.trim();
  if (url) {
    body += '\n<div style="margin-top:28px;text-align:center;"><a href="' + url + '" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;text-decoration:none;font-family:\'Zen Maru Gothic\',sans-serif;font-weight:700;font-size:15px;color:#fff;background:#6f9fc1;padding:14px 32px;border-radius:999px;box-shadow:0 4px 0 #5a89ab;">詳しくはこちら →</a></div>';
  }

  var article = {
    id: __editingId || ('post-' + Date.now()),
    date: date,
    category: cat,
    title: title,
    excerpt: document.getElementById('f-excerpt').value.trim() || title,
    image: document.getElementById('f-image').value.trim(),
    body: body ? '<p style="font-size:15px;line-height:2.0;color:#6b6358;">' + body.replace(/\n/g,'<br>') + '</p>' : '',
    dynamic: true,
  };

  var isEdit = !!__editingId;
  var activeBtn = isEdit ? document.getElementById('update-btn') : btn;
  activeBtn.disabled = true;
  activeBtn.textContent = isEdit ? '更新中...' : '投稿中...';

  var method = isEdit ? 'PATCH' : 'POST';
  var payload = isEdit
    ? { password: window.__adminPass, id: __editingId, article: article }
    : { password: window.__adminPass, article: article };

  fetch('/api/news-admin', {
    method: method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok) {
      showMsg(isEdit ? '✅ 更新しました！' : '✅ 投稿しました！サイトに反映されました。', 'ok');
      cancelEdit();
      loadArticles();
    } else {
      showMsg('❌ ' + (data.error || (isEdit ? '更新に失敗しました' : '投稿に失敗しました')), 'err');
    }
  })
  .catch(function() {
    showMsg('❌ 通信エラーが発生しました', 'err');
  })
  .finally(function() {
    activeBtn.disabled = false;
    activeBtn.textContent = isEdit ? '更新する' : '投稿する';
  });
}

function deleteArticle(id) {
  if (!confirm('この記事を削除しますか？')) return;
  fetch('/api/news-admin', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: window.__adminPass, id: id }),
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.ok) { loadArticles(); }
    else alert('削除に失敗しました: ' + (data.error || ''));
  });
}

function clearForm() {
  __editingId = null;
  document.getElementById('f-title').value = '';
  document.getElementById('f-excerpt').value = '';
  document.getElementById('f-image').value = '';
  document.getElementById('f-image-file').value = '';
  document.getElementById('f-body').value = '';
  document.getElementById('f-url').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('upload-status').textContent = '';
  document.getElementById('form-title').textContent = '新しい記事を投稿';
  document.getElementById('edit-cancel-bar').style.display = 'none';
  document.getElementById('submit-btn').style.display = 'block';
  document.getElementById('update-btn-wrap').style.display = 'none';
}

function showMsg(text, type) {
  var el = document.getElementById('result-msg');
  el.textContent = text;
  el.className = 'result-msg ' + type;
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 5000);
}
</script>
</body>
</html>
