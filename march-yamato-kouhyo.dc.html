<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;}body{margin:0;background:#faf7f0;}
/* nv-responsive */
img{max-width:100%;}
html{-webkit-text-size-adjust:100%;}
@media (max-width:1000px){
  /* 多カラムグリッドを1カラムに */
  [style*="grid-template-columns:repeat(3"],
  [style*="grid-template-columns:repeat(4"],
  [style*="grid-template-columns:1fr 1fr 1fr"],
  [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important;}
  /* flex子要素のmin-widthを解除して重なり・はみ出しを防ぐ */
  [style*="min-width:"]{min-width:0 !important;}
  /* 固定幅の画像カラムを全幅に */
  [style*="width:300px"],[style*="width:180px"]{width:100% !important;}
  /* 画像カラムは高さを固定して、画像がテキストに重なるのを防ぐ */
  [style*="min-height:240px"]{height:210px !important;min-height:0 !important;overflow:hidden !important;}
  /* 縦中央寄せカラムが内容より低いと上下にはみ出して重なるため解除 */
  [style*="flex-direction:column"][style*="justify-content:center"]{display:block !important;height:auto !important;}
  /* 画像+テキストの横並びカードは縦積みにして、flex行高さによる重なりを防ぐ */
  [style*="border-radius:22px"][style*="display:flex"]{display:block !important;}
  /* 折り返し禁止を解除 */
  [style*="white-space:nowrap"]{white-space:normal !important;}
  /* セクション左右余白を圧縮 */
  section[style*="padding"]{padding-left:24px !important;padding-right:24px !important;}
  /* 見出しの縮小 */
  h1{font-size:28px !important;line-height:1.4 !important;}
  h2{font-size:22px !important;line-height:1.5 !important;}
  h3{font-size:17px !important;line-height:1.5 !important;}
}
@media (max-width:680px){
  section[style*="padding"]{padding-left:16px !important;padding-right:16px !important;}
  /* カード内の大きな余白を圧縮 */
  [style*="padding:52px 56px"],[style*="padding:48px 52px"],[style*="padding:44px 48px"],
  [style*="padding:40px 44px"],[style*="padding:36px 40px"],[style*="padding:34px 38px"],
  [style*="padding:32px 36px"],[style*="padding:14px 44px"]{padding:24px 20px !important;}
  /* テーブルを縦積みに */
  table th,table td{display:block !important;width:auto !important;padding-left:0 !important;padding-right:0 !important;}
  table th{padding-bottom:4px !important;}
  table td{padding-top:0 !important;padding-bottom:16px !important;}
  h1{font-size:24px !important;}
  h2{font-size:20px !important;}
  /* ヒーローの高さを抑える */
  section[style*="height:480px"],section[style*="height:420px"]{height:320px !important;}
}
</style>
</helmet>
<div style="background:#faf7f0;font-family:'Noto Sans JP',sans-serif;">
  <dc-import name="Header" hint-size="100%,80px"></dc-import>

  <!-- ページヘッダー -->
  <section style="background:#c86880;padding:52px 52px 44px;">
    <div style="max-width:900px;margin:0 auto;">
      <a href="march-yamato.dc.html" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;color:rgba(255,255,255,.8);font-size:13px;margin-bottom:20px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        マーチ大和 トップへ戻る
      </a>
      <div style="font-family:'Quicksand',sans-serif;font-weight:700;font-size:12px;letter-spacing:.18em;color:rgba(255,255,255,.7);margin-bottom:10px;">DISCLOSURE</div>
      <h1 style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:32px;color:#fff;margin:0 0 10px;">放課後等デイサービス<br>マーチ大和 自己評価結果等の公表</h1>
      <p style="font-size:14px;color:rgba(255,255,255,.8);margin:0;line-height:1.8;">障害福祉サービス等自己評価結果等の公表制度に基づき、事業所の評価結果を公開しています。</p>
    </div>
  </section>

  <!-- PDF一覧 -->
  <section style="padding:80px 52px;background:#fff;">
    <div style="max-width:900px;margin:0 auto;">

      <!-- 最新年度 -->
      <div id="kouhyo-list-march-yamato"></div>

    </div>
  </section>

  <!-- 戻るボタン -->
  <section style="padding:48px 52px;background:#faf7f0;text-align:center;">
    <a href="march-yamato.dc.html" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:15px;color:#c86880;border:2px solid #c86880;padding:14px 36px;border-radius:999px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      マーチ大和 トップへ戻る
    </a>
  </section>

  <dc-import name="Footer" hint-size="100%,260px"></dc-import>
</div>
</x-dc>
<script>
/* =====================================================
   自己評価結果等の公表 PDFデータ
   ★ 追加方法: KOUHYO_DATA 配列に以下の形式で追加する
   {
     year: '2025年度',          // 表示用年度ラベル
     files: [
       { label: '自己評価', path: 'uploads/kouhyo/march-yamato-2025-self.pdf' },
       { label: '利用者評価', path: 'uploads/kouhyo/march-yamato-2025-user.pdf' },
       { label: '保護者評価', path: 'uploads/kouhyo/march-yamato-2025-parent.pdf' },
       { label: '総括表', path: 'uploads/kouhyo/march-yamato-2025-summary.pdf' },
     ]
   }
   =====================================================
*/
var KOUHYO_DATA = [
  /* データは後ほど追加 */
];

var accent = '#c86880';
var container = document.getElementById('kouhyo-list-march-yamato');

if (!KOUHYO_DATA.length) {
  container.innerHTML = '<div style="text-align:center;padding:80px 0;color:#a99c8f;font-size:15px;">自己評価結果等の公表データは準備中です。</div>';
} else {
  KOUHYO_DATA.forEach(function(group, gi) {
    var yearDiv = document.createElement('div');
    yearDiv.style.cssText = 'margin-bottom:' + (gi < KOUHYO_DATA.length - 1 ? '56px' : '0') + ';';

    var heading = '<div style="display:flex;align-items:center;gap:14px;margin-bottom:28px;">'
      + '<div style="width:6px;height:28px;border-radius:3px;background:' + accent + ';flex:none;"></div>'
      + '<h2 style="font-family:\'Zen Maru Gothic\',sans-serif;font-weight:900;font-size:22px;color:#43332a;margin:0;">' + group.year + '</h2>'
      + '</div>';

    var grid = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;">';
    group.files.forEach(function(f) {
      grid += '<a href="' + f.path + '" target="_blank" rel="noopener" style="text-decoration:none;display:flex;align-items:center;gap:14px;background:#faf7f0;border-radius:14px;padding:18px 20px;transition:box-shadow .2s;" onmouseover="this.style.boxShadow=\'0 4px 16px rgba(200,104,128,.18)\'" onmouseout="this.style.boxShadow=\'none\'">'
        + '<svg width="36" height="44" viewBox="0 0 36 44" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="36" height="44" rx="4" fill="#e8c8d0"/><text x="18" y="28" text-anchor="middle" font-size="11" font-weight="bold" fill="#c86880" font-family="sans-serif">PDF</text></svg>'
        + '<div><div style="font-family:\'Zen Maru Gothic\',sans-serif;font-weight:700;font-size:14px;color:#43332a;margin-bottom:4px;">' + f.label + '</div>'
        + '<div style="font-size:11px;color:#a99c8f;">クリックで開く</div></div>'
        + '</a>';
    });
    grid += '</div>';

    yearDiv.innerHTML = heading + grid;
    container.appendChild(yearDiv);
  });
}
</script>
</body>
</html>
