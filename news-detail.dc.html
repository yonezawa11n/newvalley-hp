<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}body{margin:0;background:#faf7f0;}
.news-body p{font-size:15px;line-height:2.2;color:#6b6358;margin:0 0 24px;}
.news-body h2{font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:22px;color:#43332a;margin:40px 0 16px;}
.news-body h3{font-family:'Zen Maru Gothic',sans-serif;font-weight:700;font-size:18px;color:#43332a;margin:32px 0 12px;}
.news-body ul,.news-body ol{font-size:15px;line-height:2.0;color:#6b6358;padding-left:24px;margin:0 0 24px;}
.news-body img{max-width:100%;border-radius:12px;margin:16px 0;}

/* nv-responsive */
img{max-width:100%;}
html{-webkit-text-size-adjust:100%;}
@media (max-width:1000px){
  /* 多カラムグリッドを1カラムに */
  [style*="grid-template-columns:repeat(3"],
  [style*="grid-template-columns:repeat(4"],
  [style*="grid-template-columns:1fr 1fr 1fr"],
  [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr !important;}
  /* flex子要素のmin-widthを解除して重なり・はみ出しを防ぐ */
  [style*="min-width:"]{min-width:0 !important;}
  /* 固定幅の画像カラムを全幅に */
  [style*="width:300px"],[style*="width:180px"]{width:100% !important;}
  /* 折り返し禁止を解除 */
  [style*="white-space:nowrap"]{white-space:normal !important;}
  /* セクション左右余白を圧縮 */
  section[style*="padding"]{padding-left:24px !important;padding-right:24px !important;}
  /* 見出しの縮小 */
  h1{font-size:28px !important;line-height:1.4 !important;}
  h2{font-size:22px !important;line-height:1.5 !important;}
  h3{font-size:17px !important;line-height:1.5 !important;}
}
@media (max-width:680px){
  section[style*="padding"]{padding-left:16px !important;padding-right:16px !important;}
  /* カード内の大きな余白を圧縮 */
  [style*="padding:52px 56px"],[style*="padding:48px 52px"],[style*="padding:44px 48px"],
  [style*="padding:40px 44px"],[style*="padding:36px 40px"],[style*="padding:34px 38px"],
  [style*="padding:32px 36px"],[style*="padding:14px 44px"]{padding:24px 20px !important;}
  /* テーブルを縦積みに */
  table th,table td{display:block !important;width:auto !important;padding-left:0 !important;padding-right:0 !important;}
  table th{padding-bottom:4px !important;}
  table td{padding-top:0 !important;padding-bottom:16px !important;}
  h1{font-size:24px !important;}
  h2{font-size:20px !important;}
  /* ヒーローの高さを抑える */
  section[style*="height:480px"],section[style*="height:420px"]{height:320px !important;}
}
</style>
</helmet>
<div style="background:#faf7f0;font-family:'Noto Sans JP',sans-serif;">
  <dc-import name="Header" hint-size="100%,80px"></dc-import>

  <div id="article-wrap"></div>

  <dc-import name="Footer" hint-size="100%,260px"></dc-import>
</div>

<script src="./news-data.js"></script>
<script src="./news-loader.js"></script>
<script>
(function(){
  var params = new URLSearchParams(location.search);
  var id = params.get('id');
  var wrap = document.getElementById('article-wrap');

  NewsLoader.load().then(function(articles){
    var article = articles.find(function(n){ return n.id === id; });

    if(!article){
      wrap.innerHTML = '<div style="text-align:center;padding:80px 20px;"><p style="color:#a99c8f;font-size:15px;">記事が見つかりませんでした。</p><a href="news.dc.html" style="color:#4a7a3f;font-weight:700;">← お知らせ一覧へ戻る</a></div>';
      return;
    }

  var color = newsCategoryColor(article.category);
  var imgHTML = article.image
    ? '<div style="height:420px;overflow:hidden;border-radius:0;"><img src="' + article.image + '" alt="' + article.title + '" style="width:100%;height:100%;object-fit:cover;display:block;" loading="lazy"></div>'
    : '';

  wrap.innerHTML =
    imgHTML +
    '<section style="padding:56px 52px 80px;">' +
      '<div style="max-width:800px;margin:0 auto;">' +
        '<a href="news.dc.html" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#a99c8f;text-decoration:none;margin-bottom:28px;">← お知らせ一覧へ戻る</a>' +
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">' +
          '<span style="font-size:12px;font-weight:700;color:#fff;background:' + color + ';padding:4px 14px;border-radius:999px;">' + article.category + '</span>' +
          '<span style="font-size:13px;color:#a99c8f;">' + newsFormatDate(article.date) + '</span>' +
        '</div>' +
        '<h1 style="font-family:\'Zen Maru Gothic\',sans-serif;font-weight:900;font-size:30px;color:#43332a;margin:0 0 32px;line-height:1.5;">' + article.title + '</h1>' +
        '<div style="width:56px;height:4px;border-radius:999px;background:' + color + ';margin-bottom:40px;"></div>' +
        '<div class="news-body">' + article.body + '</div>' +
        '<div style="margin-top:56px;padding-top:32px;border-top:1px solid #ece4d4;text-align:center;">' +
          '<a href="news.dc.html" style="display:inline-flex;align-items:center;gap:8px;font-family:\'Zen Maru Gothic\',sans-serif;font-weight:700;font-size:14px;color:#43332a;text-decoration:none;background:#fff;padding:12px 28px;border-radius:999px;box-shadow:0 4px 14px rgba(67,51,42,.1);">← お知らせ一覧へ戻る</a>' +
        '</div>' +
      '</div>' +
    '</section>';
  }); // NewsLoader.load().then
})();
</script>
</x-dc>
</body>
</html>
