<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;}body{margin:0;background:#faf7f0;}</style>
</helmet>
<div style="background:#faf7f0;font-family:'Noto Sans JP',sans-serif;">
  <dc-import name="Header" hint-size="100%,80px"></dc-import>

  <!-- HERO -->
  <section style="background:#43332a;padding:56px 52px 52px;">
    <div style="max-width:1080px;margin:0 auto;">
      <div style="font-family:'Quicksand',sans-serif;font-weight:700;font-size:13px;letter-spacing:.22em;color:rgba(255,255,255,.55);margin-bottom:12px;">NEWS &amp; TOPICS</div>
      <h1 style="font-family:'Zen Maru Gothic',sans-serif;font-weight:900;font-size:36px;color:#fff;margin:0;">お知らせ</h1>
    </div>
  </section>

  <!-- カテゴリフィルター + 一覧 -->
  <section style="padding:64px 52px 80px;">
    <div style="max-width:1080px;margin:0 auto;">

      <!-- フィルターボタン -->
      <div id="news-filter" style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:48px;"></div>

      <!-- 記事グリッド -->
      <div id="news-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:28px;"></div>

      <!-- 空メッセージ -->
      <div id="news-empty" style="display:none;text-align:center;padding:60px 0;color:#a99c8f;font-size:15px;">記事がありません</div>
    </div>
  </section>

  <dc-import name="Footer" hint-size="100%,260px"></dc-import>
</div>

<script src="./news-data.js"></script>
<script src="./news-loader.js"></script>
<script>
(function(){
  var activeCategory = 'すべて';
  var ALL_ARTICLES = [];

  var filterEl = document.getElementById('news-filter');
  var grid = document.getElementById('news-grid');
  var empty = document.getElementById('news-empty');

  // ローディング表示
  grid.style.display = 'none';
  empty.style.display = 'block';
  empty.textContent = '読み込み中...';

  NewsLoader.load().then(function(articles){
    ALL_ARTICLES = articles;

    /* カテゴリ一覧 */
    var categories = ['すべて'];
    ALL_ARTICLES.forEach(function(n){
      if(categories.indexOf(n.category) === -1) categories.push(n.category);
    });

    /* フィルターボタン描画 */
    filterEl.innerHTML = '';
    categories.forEach(function(cat){
      var btn = document.createElement('button');
      btn.textContent = cat;
      btn.dataset.cat = cat;
      btn.style.cssText = 'border:none;cursor:pointer;font-family:\'Zen Maru Gothic\',sans-serif;font-weight:700;font-size:13px;padding:8px 20px;border-radius:999px;transition:all .2s;';
      btn.addEventListener('click', function(){
        activeCategory = cat;
        renderFilter();
        renderGrid();
      });
      filterEl.appendChild(btn);
    });

    renderFilter();
    renderGrid();
  });

  function renderFilter(){
    filterEl.querySelectorAll('button').forEach(function(btn){
      var active = btn.dataset.cat === activeCategory;
      btn.style.background = active ? '#43332a' : '#fff';
      btn.style.color = active ? '#fff' : '#43332a';
      btn.style.boxShadow = active ? 'none' : '0 2px 8px rgba(67,51,42,.1)';
    });
  }

  /* 記事カード描画 */
  function renderGrid(){
    var filtered = ALL_ARTICLES.filter(function(n){
      return activeCategory === 'すべて' || n.category === activeCategory;
    });
    grid.innerHTML = '';
    if(filtered.length === 0){
      grid.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    grid.style.display = 'grid';
    empty.style.display = 'none';
    filtered.forEach(function(n){
      var color = newsCategoryColor(n.category);
      var imgHTML = n.image
        ? '<div style="height:200px;overflow:hidden;"><img src="' + n.image + '" alt="' + n.title + '" style="width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;" loading="lazy"></div>'
        : '<div style="height:200px;background:linear-gradient(135deg,#f0e8d8,#e0d4c0);display:flex;align-items:center;justify-content:center;"><span style="font-family:\'Quicksand\',sans-serif;font-weight:700;font-size:13px;letter-spacing:.15em;color:#a99c8f;">NEW VALLEY</span></div>';
      var card = document.createElement('a');
      card.href = 'news-detail.dc.html?id=' + n.id;
      card.style.cssText = 'display:block;text-decoration:none;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 18px rgba(67,51,42,.07);transition:transform .25s,box-shadow .25s;';
      card.onmouseover = function(){ this.style.transform='translateY(-4px)'; this.style.boxShadow='0 12px 32px rgba(67,51,42,.13)'; };
      card.onmouseout  = function(){ this.style.transform='translateY(0)';   this.style.boxShadow='0 4px 18px rgba(67,51,42,.07)'; };
      card.innerHTML = imgHTML +
        '<div style="padding:24px 24px 28px;">' +
          '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
            '<span style="font-size:12px;font-weight:700;color:#fff;background:' + color + ';padding:3px 12px;border-radius:999px;">' + n.category + '</span>' +
            '<span style="font-size:12px;color:#a99c8f;">' + newsFormatDate(n.date) + '</span>' +
          '</div>' +
          '<h3 style="font-family:\'Zen Maru Gothic\',sans-serif;font-weight:700;font-size:16px;color:#43332a;margin:0 0 10px;line-height:1.55;">' + n.title + '</h3>' +
          '<p style="font-size:13px;line-height:1.9;color:#6b6358;margin:0 0 18px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">' + n.excerpt + '</p>' +
          '<span style="font-size:13px;font-weight:700;color:' + color + ';">続きを読む →</span>' +
        '</div>';
      grid.appendChild(card);
    });
  }

  renderFilter();
  renderGrid();
})();
</script>
</x-dc>
</body>
</html>
